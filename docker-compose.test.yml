services:
  test:
    image: golang:1.25-alpine
    working_dir: /src
    volumes:
      - .:/src
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      CGO_ENABLED: "1"
      GOFLAGS: "-count=1"
    command: sh -c "apk add --no-cache git build-base >/dev/null && go mod tidy && go vet ./... && go test -race -v ./tests/..."

volumes:
  go-mod-cache:
  go-build-cache:
